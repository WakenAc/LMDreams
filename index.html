<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>LMDreams — Construção Civil e Remodelações em Portugal</title>
    <meta name="title" content="LMDreams — Construção Civil e Remodelações" />
    <meta
      name="description"
      content="Empresa de construção civil com mais de 20 anos de experiência. Profissionais especializados em cada área. Remodelações, obras e construção com qualidade e transparência."
    />
    <meta
      name="keywords"
      content="empresa de construção civil, remodelações, obras, construção e remodelação, remodelação de casas, remodelação de cozinhas, remodelação de casas de banho, empresa de obras, profissionais de construção, Portugal"
    />
    <meta name="author" content="LMDreams" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Portuguese" />
    <meta name="revisit-after" content="30 days" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lmdreams.pt/" />
    <meta property="og:title" content="LMDreams — Construção Civil e Remodelações" />
    <meta
      property="og:description"
      content="Profissionais especializados em cada área da construção. Mais de 20 anos de experiência em obras, remodelações e construção civil em Portugal."
    />
    <meta property="og:image" content="/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://lmdreams.pt/" />
    <meta property="twitter:title" content="LMDreams — Construção Civil e Remodelações" />
    <meta
      property="twitter:description"
      content="Profissionais especializados em cada área da construção. Mais de 20 anos de experiência em obras, remodelações e construção civil em Portugal."
    />
    <meta property="twitter:image" content="/og-image.jpg" />

    <!-- Structured Data: LocalBusiness / GeneralContractor -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "LMDreams",
      "description": "Empresa de construção civil com mais de 20 anos de experiência. Profissionais especializados em cada área da construção.",
      "url": "https://lmdreams.pt/",
      "telephone": "+351 919 233 372",
      "email": "mendes3pm@gmail.com",
      "areaServed": {
        "@type": "Country",
        "name": "Portugal"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços de Construção Civil",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Construção civil" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Remodelações completas" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Canalização" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Eletricidade" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Pintura" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Carpintaria" } }
        ]
      }
    }
    </script>

    <!-- Google Fonts: Inter + Instrument Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
